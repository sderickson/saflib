version: v1.3.1

dsn: sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc

serve:
  public:
    base_url: http://kratos.docker.localhost/
    cors:
      enabled: false
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://auth.docker.localhost/

  # Permit return_to from any app on this dev domain (e.g. app.recipes.docker.localhost).
  # Root host is listed separately; *.docker.localhost does not match the apex.
  allowed_return_urls:
    - http://docker.localhost/
    - http://*.docker.localhost/

  flows:
    registration:
      enabled: true
      ui_url: http://auth.docker.localhost/registration

    login:
      ui_url: http://auth.docker.localhost/login

    recovery:
      enabled: true
      ui_url: http://auth.docker.localhost/recovery

    settings:
      ui_url: http://auth.docker.localhost/settings

    logout:
      after:
        default_browser_return_url: http://auth.docker.localhost/

    verification:
      enabled: true
      ui_url: http://auth.docker.localhost/verification
      use: code

  methods:
    password:
      enabled: true

session:
  cookie:
    domain: .docker.localhost
    same_site: Lax

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  delivery_strategy: http
  http:
    request_config:
      url: http://monolith:3000/email/kratos-courier
      method: POST
      body: file:///etc/config/kratos/courier-body.jsonnet
      headers:
        Content-Type: application/json

# Required for sessions to survive Kratos restarts: without explicit secrets, each
# process start uses new random keys, so existing session cookies cannot be decrypted
# (identities in SQLite still look fine). These are dev-only placeholders, not for prod.
secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

log:
  level: warning
  format: text
