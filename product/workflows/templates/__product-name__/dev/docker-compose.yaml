# common elements between dev and test
services:
  caddy:
    depends_on:
      - clients
    build:
      context: ../..
      dockerfile: ./__product-name__/dev/Dockerfile
    ports:
      - 80:80
    volumes:
      - ./caddy-config:/etc/caddy/
      - caddy_data:/data
      - caddy_config:/config

  clients:
    image: __organization-name__-__product-name__-clients:latest
    build:
      context: ../..
      dockerfile: ./__product-name__/clients/build/Dockerfile
    env_file:
      - ./env.dev
    volumes:
      - ../../__product-name__/clients/:/app/__product-name__/clients/
      - ../../saflib/:/app/saflib/
      - ../../__product-name__/service/sdk/:/app/__product-name__/service/sdk/
    command: npm run dev

  __product-name__-monolith:
    image: __organization-name__-__product-name__-monolith:latest
    volumes:
      - ../../__product-name__/service/db/data:/app/__product-name__/service/db/data
      - ../../__product-name__/service/cron/data:/app/__product-name__/service/cron/data

    build:
      context: ../..
      dockerfile: __product-name__/service/monolith/Dockerfile

    env_file:
      - ./env.dev
      - ./.env

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    command: migrate sql -e --yes
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    volumes:
      # Persists SQLite (identities, sessions, flows) across container restarts
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

  kratos:
    image: oryd/kratos:v26.2.0
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
      - DSN=sqlite:///var/lib/sqlite/db.sqlite?_fk=true&mode=rwc
    env_file:
      - ./env.kratos.config
    volumes:
      - ./kratos/data:/var/lib/sqlite
      - ./kratos:/etc/config/kratos

volumes:
  caddy_data:
  caddy_config:
